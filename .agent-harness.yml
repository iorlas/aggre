# AI Harness configuration
stacks: [docker, dokploy, python]

python:
  coverage_threshold: 95
  line_length: 120

docker:
  own_image_prefix: "ghcr.io/iorlas/"
  conftest_skip:
    scripts/autonomy/Dockerfile:
      - dockerfile.user         # runs as root intentionally (docker socket)
      - dockerfile.healthcheck  # not a service, runs to completion
      - dockerfile.cache        # build speed not critical for utility image
