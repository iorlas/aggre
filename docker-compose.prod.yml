# AGGRE data services — managed by Dokploy
# PostgreSQL + Garage accessible via Tailscale (aggre-shen)
services:
  tailscale:
    image: tailscale/tailscale:latest
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_HOSTNAME: aggre-shen
      TS_STATE_DIR: /var/lib/tailscale
    cap_add: [NET_ADMIN, NET_RAW]
    volumes:
      - ts-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    networks:
      - dokploy-network
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    network_mode: service:tailscale
    depends_on: [tailscale]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aggre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-aggre}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aggre"]
      interval: 10s
      timeout: 5s
      retries: 5

  garage:
    image: dxflrs/garage:v2.2.0
    network_mode: service:tailscale
    depends_on: [tailscale]
    volumes:
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
      - ./deploy/garage.toml:/etc/garage.toml:ro
    restart: unless-stopped

volumes:
  ts-state:
  postgres-data:
  garage-meta:
  garage-data:

networks:
  dokploy-network:
    external: true
