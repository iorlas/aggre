# Local dev setup: Dagster UI with autoreload on source changes.
# Usage: make dev  (or: docker compose -f docker-compose.local.yml up --build --watch)
#
# Dagster UI at http://localhost:3000
# Data persists in ./data/postgres/ between runs.
#
# Test database (ephemeral):
#   make test-e2e

x-app-env: &app-env
  AGGRE_DATABASE_URL: postgresql+psycopg2://aggre:aggre@postgres/aggre
  AGGRE_BROWSERLESS_URL: http://browserless:3000

services:
  browserless:
    image: ghcr.io/browserless/chromium
    restart: unless-stopped
    environment:
      MAX_CONCURRENT_SESSIONS: 5
      TIMEOUT: 60000
      HEALTH: "true"
      DEBUG: "browserless.io:*:info,browserless.io:*:warn,browserless.io:*:error"
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/json/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aggre
      POSTGRES_USER: aggre
      POSTGRES_PASSWORD: aggre
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aggre"]
      interval: 5s
      timeout: 5s
      retries: 5

  test-db:
    image: postgres:16-alpine
    profiles: [test]
    environment:
      POSTGRES_DB: aggre_test
      POSTGRES_USER: aggre
      POSTGRES_PASSWORD: aggre
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aggre"]
      interval: 2s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  migrate:
    build: .
    command: uv run alembic upgrade head
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      <<: *app-env
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy

  dagster-dev:
    build: .
    command: uv run dagster dev -h 0.0.0.0 -p 3000
    develop:
      watch:
        - action: sync
          path: ./src/
          target: /app/src/
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
      - ./dagster.yaml:/app/dagster.yaml:ro  # dev config (no postgres storage)
    ports:
      - "3000:3000"
    environment:
      <<: *app-env
    env_file:
      - path: .env
        required: false
    depends_on:
      migrate:
        condition: service_completed_successfully
      browserless:
        condition: service_healthy
