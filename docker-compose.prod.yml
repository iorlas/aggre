# AGGRE production stack — managed by Dokploy on shen
# All services on dokploy-network. Docker daemon uses 100.100.100.100 for Tailscale DNS.
# postgres and garage bind to ${TAILSCALE_IP} (shen Tailscale IP) — private, not public-facing.

services:
  postgres:
    image: postgres:17-alpine
    pull_policy: always
    hostname: aggre-postgres
    networks:
      - dokploy-network
      - aggre-internal
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aggre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-aggre}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${TAILSCALE_IP}:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aggre"]
      interval: 10s
      timeout: 5s
      retries: 5

  garage-init:
    image: busybox:1.37
    entrypoint:
      - sh
      - -c
      - |
        cat > /config/garage.toml <<'TOML'
        metadata_dir = "/var/lib/garage/meta"
        data_dir = "/var/lib/garage/data"
        db_engine = "lmdb"
        replication_factor = 1
        rpc_bind_addr = "[::]:3901"
        rpc_secret = "placeholder"
        [s3_api]
        s3_region = "garage"
        api_bind_addr = "[::]:3900"
        root_domain = ".s3.garage.localhost"
        [s3_web]
        bind_addr = "[::]:3902"
        root_domain = ".web.garage.localhost"
        [admin]
        api_bind_addr = "[::]:3903"
        TOML
    volumes:
      - garage-config:/config

  garage:
    image: dxflrs/garage:v2.2.0
    hostname: aggre-garage
    networks:
      - dokploy-network
    depends_on:
      garage-init:
        condition: service_completed_successfully
    environment:
      GARAGE_CONFIG_FILE: /config/garage.toml
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
      GARAGE_METRICS_TOKEN: ${GARAGE_METRICS_TOKEN}
      GARAGE_ALLOW_WORLD_READABLE_SECRETS: "true"
    volumes:
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
      - garage-config:/config:ro
    ports:
      - "${TAILSCALE_IP}:3900:3900"  # S3 API
      - "${TAILSCALE_IP}:3902:3902"  # Web
      - "${TAILSCALE_IP}:3903:3903"  # Admin
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/garage", "node", "id"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  hatchet-postgres:
    image: postgres:17-alpine
    pull_policy: always
    networks:
      - aggre-internal
    command:
      - postgres
      - -c
      - shared_buffers=2GB
      - -c
      - work_mem=128MB
      - -c
      - maintenance_work_mem=2GB
      - -c
      - effective_cache_size=8GB
      - -c
      - wal_buffers=64MB
      - -c
      - max_wal_size=15GB
      - -c
      - autovacuum_max_workers=10
      - -c
      - autovacuum_vacuum_scale_factor=0.1
      - -c
      - autovacuum_analyze_scale_factor=0.05
      - -c
      - autovacuum_vacuum_threshold=25
      - -c
      - autovacuum_analyze_threshold=25
      - -c
      - autovacuum_vacuum_cost_delay=10ms
      - -c
      - autovacuum_vacuum_cost_limit=1000
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.1
    environment:
      POSTGRES_DB: hatchet
      POSTGRES_USER: hatchet
      POSTGRES_PASSWORD: hatchet
    volumes:
      - hatchet-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hatchet"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  hatchet-pg-maintenance:
    image: postgres:17-alpine
    pull_policy: always
    networks:
      - aggre-internal
    # Periodic ANALYZE on partitioned parent tables — PostgreSQL autovacuum
    # skips these, causing stale planner stats and bad query plans.
    command: >
      sh -c 'sleep 60; while true;
      do psql "$$DATABASE_URL" -c "ANALYZE v1_tasks_olap; ANALYZE v1_runs_olap; ANALYZE v1_dags_olap;" 2>&1;
      sleep 3600; done'
    environment:
      DATABASE_URL: "postgresql://hatchet:hatchet@hatchet-postgres:5432/hatchet"
    depends_on:
      hatchet-postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x sh || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 90s

  hatchet-lite:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:latest
    pull_policy: always
    hostname: aggre-hatchet
    networks:
      - dokploy-network
      - aggre-internal
    depends_on:
      hatchet-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://hatchet:hatchet@hatchet-postgres:5432/hatchet?sslmode=disable"
      SERVER_AUTH_COOKIE_DOMAIN: hatchet.ts.shen.iorlas.net
      SERVER_AUTH_COOKIE_INSECURE: "t"
      SERVER_GRPC_BIND_ADDRESS: "0.0.0.0"
      SERVER_GRPC_INSECURE: "t"
      SERVER_GRPC_BROADCAST_ADDRESS: "hatchet-lite:7077"
      SERVER_GRPC_PORT: "7077"
      SERVER_URL: "http://hatchet.ts.shen.iorlas.net"
      SERVER_AUTH_SET_EMAIL_VERIFIED: "t"
      SERVER_ENABLE_DATA_RETENTION: "true"
      SERVER_LIMITS_DEFAULT_TENANT_RETENTION_PERIOD: "240h"
      SEED_DEFAULT_ADMIN_EMAIL: "admin@example.com"
      SEED_DEFAULT_ADMIN_PASSWORD: "AggReHatchet-Admin-2026"
    volumes:
      - hatchet-config:/config
    labels:
      - tailscale=true
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.aggre-hatchet.rule=Host(`hatchet.ts.shen.iorlas.net`)
      - traefik.http.routers.aggre-hatchet.entrypoints=web
      - traefik.http.services.aggre-hatchet.loadbalancer.server.port=8888
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/api/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  migrate:
    image: ghcr.io/iorlas/aggre:${IMAGE_TAG}
    networks:
      - dokploy-network
    command: uv run alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AGGRE_DATABASE_URL: "postgresql+psycopg://aggre:${POSTGRES_PASSWORD}@postgres:5432/aggre"
    env_file:
      - path: .env
        required: false

  browserless:
    image: ghcr.io/browserless/chromium:latest
    pull_policy: always
    hostname: aggre-browserless
    init: true
    environment:
      CONCURRENT: "10"
      TIMEOUT: "60000"
      HEALTH: "true"
      MAX_CPU_PERCENT: "90"
      MAX_MEMORY_PERCENT: "85"
    deploy:
      resources:
        limits:
          memory: 8G
    networks:
      - dokploy-network
    labels:
      - deunhealth.restart.on.unhealthy=true
    restart: unless-stopped
    healthcheck:
      # Health check: Chrome must respond AND container must be under 24h uptime.
      # After 24h, reports unhealthy so deunhealth restarts it (prevents /tmp leak, issue #3969).
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/json/version && test $$(( $$(date +%s) - $$(stat -c %Y /proc/1) )) -lt 86400 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  deunhealth:
    image: qmcgaw/deunhealth
    pull_policy: always
    hostname: aggre-deunhealth
    networks:
      - aggre-internal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # required: deunhealth monitors Docker API for unhealthy containers
    environment:
      LOG_LEVEL: info
    restart: always
    healthcheck:
      test: ["CMD", "/app", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  hatchet-worker:
    image: ghcr.io/iorlas/aggre:${IMAGE_TAG}
    hostname: aggre-worker
    networks:
      - dokploy-network
    dns:
      - 100.100.100.100
      - 1.1.1.1
    command: uv run python -m aggre.workflows
    depends_on:
      migrate:
        condition: service_completed_successfully
      hatchet-lite:
        condition: service_healthy
    environment:
      AGGRE_DATABASE_URL: "postgresql+psycopg://aggre:${POSTGRES_PASSWORD}@postgres:5432/aggre"
      AGGRE_BRONZE_S3_ENDPOINT: "http://garage:3900"
      AGGRE_BRONZE_S3_BUCKET: aggre-bronze
      AGGRE_BRONZE_S3_ACCESS_KEY: ${AGGRE_BRONZE_S3_ACCESS_KEY}
      AGGRE_BRONZE_S3_SECRET_KEY: ${AGGRE_BRONZE_S3_SECRET_KEY}
      AGGRE_BRONZE_BACKEND: s3
      AGGRE_BROWSERLESS_URL: "http://browserless:3000"
      AGGRE_PROXY_API_URL: "http://proxy-api:8080"
      AGGRE_WHISPER_ENDPOINTS: "http://dtomilin-mwg.shrimp-boa.ts.net:8090:2:whisper-cpp:macbook-whisper:2,http://zep.shrimp-boa.ts.net:8100:10:openai:zep-speaches:10"
      # AGGRE_MODAL_APP_NAME: aggre-transcription  # disabled — use whisper endpoints only
      # MODAL_TOKEN_ID: ${MODAL_TOKEN_ID}
      # MODAL_TOKEN_SECRET: ${MODAL_TOKEN_SECRET}
      HATCHET_CLIENT_TLS_STRATEGY: none
      HATCHET_CLIENT_HOST_PORT: "hatchet-lite:7077"
      HATCHET_CLIENT_SERVER_URL: "http://hatchet-lite:8888"
      HATCHET_CLIENT_TOKEN: ${HATCHET_CLIENT_TOKEN}
      HATCHET_CLIENT_LISTENER_V2_TIMEOUT: "180"
    env_file:
      - path: .env
        required: false
    tmpfs:
      - /app/data/tmp:size=100G
    stop_grace_period: 300s
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os,sys;any('aggre' in open(f'/proc/{p}/cmdline','rb').read().decode('utf-8','ignore') for p in os.listdir('/proc') if p.isdigit()) or sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres-data:
  garage-meta:
  garage-data:
  garage-config:
  hatchet-postgres-data:
  hatchet-config:

networks:
  dokploy-network:
    external: true
  aggre-internal:
    internal: true
