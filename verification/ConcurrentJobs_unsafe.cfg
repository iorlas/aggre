\* ConcurrentJobs -- UNSAFE mode: no sensor guard (UseGuard=FALSE)
\* Expected: NoDoubleProcessing VIOLATED, NoLostUpdate VIOLATED
CONSTANTS
    NumItems = 3
    Jobs = {"j1", "j2"}
    UseGuard = FALSE

SPECIFICATION Spec

\* Safety invariants -- both should be VIOLATED in unsafe mode
INVARIANT NoDoubleProcessing
INVARIANT NoLostUpdate

\* Liveness -- should still PASS (items eventually complete)
PROPERTY AllComplete
