# Local dev setup: Hatchet worker with autoreload on source changes.
# Usage: make dev  (or: docker compose -f docker-compose.local.yml up --build --watch)
#
# Hatchet UI at http://localhost:8888 (login: admin@example.com / Admin123!!)
# Grafana   at http://localhost:3002 (anonymous access, no login)
# Data persists in ./data/local/postgres/ between runs.

x-app-env: &app-env
  AGGRE_DATABASE_URL: postgresql+psycopg://aggre:aggre@postgres/aggre
  AGGRE_BROWSERLESS_URL: http://browserless:3000
  AGGRE_WHISPER_SERVER_URL: http://host.docker.internal:8090
  HATCHET_CLIENT_TOKEN: ${HATCHET_CLIENT_TOKEN:-}
  HATCHET_CLIENT_TLS_STRATEGY: none
  HATCHET_CLIENT_HOST_PORT: hatchet-lite:7077
  HATCHET_CLIENT_LISTENER_V2_TIMEOUT: "180"

services:
  browserless:
    image: ghcr.io/browserless/chromium
    restart: unless-stopped
    init: true
    environment:
      MAX_CONCURRENT_SESSIONS: 5
      TIMEOUT: 60000
      HEALTH: "true"
      MAX_CPU_PERCENT: "90"
      MAX_MEMORY_PERCENT: "85"
      DEBUG: "browserless.io:*:info,browserless.io:*:warn,browserless.io:*:error"
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/json/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: aggre
      POSTGRES_USER: aggre
      POSTGRES_PASSWORD: aggre
    volumes:
      - ./data/local/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aggre"]
      interval: 5s
      timeout: 5s
      retries: 5

  garage-init:
    image: busybox:1.37
    entrypoint:
      - sh
      - -c
      - |
        cat > /config/garage.toml <<'TOML'
        metadata_dir = "/var/lib/garage/meta"
        data_dir = "/var/lib/garage/data"
        db_engine = "lmdb"
        replication_factor = 1
        rpc_bind_addr = "[::]:3901"
        rpc_secret = "20c694526e833e122d22aec38b81656e632c80a22cc9477909cede7ddbb4434a"
        [s3_api]
        s3_region = "garage"
        api_bind_addr = "[::]:3900"
        root_domain = ".s3.garage.localhost"
        [s3_web]
        bind_addr = "[::]:3902"
        root_domain = ".web.garage.localhost"
        [admin]
        api_bind_addr = "[::]:3903"
        TOML
    volumes:
      - garage-config:/config

  garage:
    image: dxflrs/garage:v2.2.0
    depends_on:
      garage-init:
        condition: service_completed_successfully
    environment:
      GARAGE_CONFIG_FILE: /config/garage.toml
    ports:
      - "3900:3900"  # S3 API
      - "3902:3902"  # Web
      - "3903:3903"  # Admin
    volumes:
      - ./data/garage/meta:/var/lib/garage/meta
      - ./data/garage/data:/var/lib/garage/data
      - garage-config:/config:ro
    restart: unless-stopped

  migrate:
    build: .
    command: uv run alembic upgrade head
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      <<: *app-env
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy

  hatchet-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hatchet
      POSTGRES_USER: hatchet
      POSTGRES_PASSWORD: hatchet
    volumes:
      - ./data/local/hatchet-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hatchet"]
      interval: 5s
      timeout: 5s
      retries: 5

  hatchet-lite:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:latest
    ports:
      - "8888:8888"
      - "7077:7077"
    environment:
      DATABASE_URL: "postgresql://hatchet:hatchet@hatchet-postgres:5432/hatchet?sslmode=disable"
      SERVER_AUTH_COOKIE_DOMAIN: localhost
      SERVER_AUTH_COOKIE_INSECURE: "t"
      SERVER_GRPC_BIND_ADDRESS: "0.0.0.0"
      SERVER_GRPC_INSECURE: "t"
      SERVER_GRPC_BROADCAST_ADDRESS: localhost:7077
      SERVER_GRPC_PORT: "7077"
      SERVER_URL: http://localhost:8888
      SERVER_AUTH_SET_EMAIL_VERIFIED: "t"
      SERVER_ENABLE_DATA_RETENTION: "true"
      SERVER_LIMITS_DEFAULT_TENANT_RETENTION_PERIOD: "720h"
      SEED_DEFAULT_ADMIN_EMAIL: "admin@example.com"
      SEED_DEFAULT_ADMIN_PASSWORD: "Admin123!!"
    volumes:
      - ./data/local/hatchet-config:/config
    depends_on:
      hatchet-postgres:
        condition: service_healthy
    restart: unless-stopped

  hatchet-worker:
    build: .
    command: uv run python -m aggre.workflows
    develop:
      watch:
        - action: sync
          path: ./src/
          target: /app/src/
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      <<: *app-env
    env_file:
      - path: .env
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrate:
        condition: service_completed_successfully
      hatchet-lite:
        condition: service_started
      browserless:
        condition: service_healthy

  grafana:
    image: grafana/grafana-oss:11.6.0
    ports:
      - "3002:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/pipeline-overview.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  garage-config:

