# infrastructure/zephyrus-browserless/docker-compose.yml
# Run on zep: docker compose -f infrastructure/zephyrus-browserless/docker-compose.yml up -d
# Accessible to shen worker at zep:3001 via Tailscale
services:
  browserless:
    image: ghcr.io/browserless/chromium
    restart: unless-stopped
    environment:
      MAX_CONCURRENT_SESSIONS: 5
      TIMEOUT: 60000
      HEALTH: "true"
    ports:
      - "3001:3000"
