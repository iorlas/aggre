name: Build and Publish Docker Image

on:
    push:
        branches:
            - master
            - main
        tags:
            - "v*"
    pull_request:
        branches:
            - master
            - main
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    deploy-modal:
        if: github.event_name != 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Deploy Modal app
              env:
                  MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
                  MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
              run: uv run modal deploy src/aggre/modal_apps/transcription.py

    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            id-token: write
            attestations: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              if: github.event_name != 'pull_request'
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=semver,pattern={{major}}
                      type=sha,prefix={{branch}}-

            - name: Build and push Docker image
              id: build
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  platforms: linux/amd64,linux/arm64

            - name: Generate artifact attestation
              if: github.event_name != 'pull_request'
              uses: actions/attest-build-provenance@v1
              with:
                  subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  subject-digest: ${{ steps.build.outputs.digest }}
                  push-to-registry: true

            - name: Push compose file and env to Dokploy
              if: github.event_name != 'pull_request'
              env:
                POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
                AGGRE_BRONZE_S3_ACCESS_KEY: ${{ secrets.AGGRE_BRONZE_S3_ACCESS_KEY }}
                AGGRE_BRONZE_S3_SECRET_KEY: ${{ secrets.AGGRE_BRONZE_S3_SECRET_KEY }}
                HATCHET_CLIENT_TOKEN: ${{ secrets.HATCHET_CLIENT_TOKEN }}
                HATCHET_ADMIN_PASSWORD: ${{ secrets.HATCHET_ADMIN_PASSWORD }}
                MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
                MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
                DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
                DOKPLOY_AUTH_TOKEN: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
                DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
              run: |
                IMAGE_TAG="main-$(echo '${{ github.sha }}' | cut -c1-7)"
                # Secrets + deployment-specific values only. Config lives in compose file.
                ENV_CONTENT=$(printf '%s\n' \
                  "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" \
                  "AGGRE_BRONZE_S3_ACCESS_KEY=${AGGRE_BRONZE_S3_ACCESS_KEY}" \
                  "AGGRE_BRONZE_S3_SECRET_KEY=${AGGRE_BRONZE_S3_SECRET_KEY}" \
                  "HATCHET_CLIENT_TOKEN=${HATCHET_CLIENT_TOKEN}" \
                  "HATCHET_ADMIN_PASSWORD=${HATCHET_ADMIN_PASSWORD}" \
                  "MODAL_TOKEN_ID=${MODAL_TOKEN_ID}" \
                  "MODAL_TOKEN_SECRET=${MODAL_TOKEN_SECRET}" \
                  "AGGRE_PROXY_URL=socks5h://shen.shrimp-boa.ts.net:1080" \
                  "TAILSCALE_IP=100.65.108.29" \
                  "IMAGE_TAG=${IMAGE_TAG}")
                # Push both compose file and env — never let them diverge
                jq -n \
                  --arg id "${DOKPLOY_COMPOSE_ID}" \
                  --arg env "$ENV_CONTENT" \
                  --arg compose "$(cat docker-compose.prod.yml)" \
                  '{composeId: $id, env: $env, composeFile: $compose}' \
                | curl -sf -X POST "${DOKPLOY_URL}/api/compose.update" \
                  -H "x-api-key: ${DOKPLOY_AUTH_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d @-

            - name: Trigger Dokploy deploy
              if: github.event_name != 'pull_request'
              uses: benbristow/dokploy-deploy-action@0.2.2
              with:
                  api_token: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
                  application_id: ${{ secrets.DOKPLOY_COMPOSE_ID }}
                  dokploy_url: ${{ secrets.DOKPLOY_URL }}
                  service_type: compose
