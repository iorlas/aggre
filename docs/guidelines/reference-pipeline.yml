# Model B — GitHub Actions + GHCR reference pipeline
# Copy to .github/workflows/deploy.yml and adapt per project.
#
# Required GitHub secrets:
#   DOKPLOY_AUTH_TOKEN  — set at org level, not per-repo
#   DOKPLOY_COMPOSE_ID  — per-repo
#   DOKPLOY_URL         — per-repo (https://shen.iorlas.net)
#   <APP_SECRETS>       — all env vars needed to reconstruct the Dokploy env payload
#
# See guidelines/model-selection.md for when to use this model.

name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
          # NOTE: No :latest tag — always use SHA-pinned tags in production.

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # Run database migrations before triggering deploy.
      # Adapt this step to your migration tool (alembic, flyway, goose, etc.).
      #- name: Run migrations
      #  if: github.event_name != 'pull_request'
      #  env:
      #    DATABASE_URL: ${{ secrets.DATABASE_URL }}
      #  run: |
      #    docker run --rm \
      #      -e DATABASE_URL \
      #      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-$(echo '${{ github.sha }}' | cut -c1-7) \
      #      alembic upgrade head

      - name: Set IMAGE_TAG in Dokploy env
        if: github.event_name != 'pull_request'
        env:
          # Add all project-specific secrets here so the full env payload can be
          # reconstructed. Dokploy env update is a full replacement — omitted vars are wiped.
          # Example:
          # DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_AUTH_TOKEN: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
        run: |
          IMAGE_TAG="main-$(echo '${{ github.sha }}' | cut -c1-7)"
          # Build full env payload — every var that Dokploy needs must be included.
          ENV_CONTENT=$(printf '%s\n' \
            "IMAGE_TAG=${IMAGE_TAG}"
            # "DB_PASSWORD=${DB_PASSWORD}"
            # Add all other vars here
          )
          curl -sf -X POST "${DOKPLOY_URL}/api/compose.update" \
            -H "x-api-key: ${DOKPLOY_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"composeId\": \"${DOKPLOY_COMPOSE_ID}\", \"env\": $(printf '%s' "$ENV_CONTENT" | jq -Rs .)}"

      - name: Trigger Dokploy deploy
        if: github.event_name != 'pull_request'
        uses: benbristow/dokploy-deploy-action@0.2.2
        with:
          api_token: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
          application_id: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          dokploy_url: ${{ secrets.DOKPLOY_URL }}
          service_type: compose
