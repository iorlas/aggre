# infrastructure/browserless-lb/docker-compose.yml
# Deployed as separate Dokploy compose app on shen.
# Worker reaches it as http://browserless-lb:8080 via dokploy-network.
services:
  browserless-lb:
    container_name: browserless-lb
    image: nginx:alpine
    networks:
      - dokploy-network
    environment:
      UPSTREAM_A: "dtomilin-mwg.shrimp-boa.ts.net:3001"  # MacBook (FQDN required — nginx async resolver doesn't expand search domains)
      UPSTREAM_B: "zep.shrimp-boa.ts.net:3001"           # zep
    command:
      - /bin/sh
      - -c
      - |
        printf 'resolver 127.0.0.11 valid=30s ipv6=off;\nsplit_clients "$$request_id" $$up {\n  50%% %s;\n  50%% %s;\n}\nserver {\n  listen 8080;\n  location / {\n    proxy_pass http://$$up;\n    proxy_http_version 1.1;\n    proxy_read_timeout 120s;\n  }\n}\n' "$UPSTREAM_A" "$UPSTREAM_B" > /etc/nginx/conf.d/default.conf
        exec nginx -g 'daemon off;'
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
