# AGGRE production stack — managed by Dokploy on shen
# All services on dokploy-network. Docker daemon uses 100.100.100.100 for Tailscale DNS.
# postgres and garage bind to ${TAILSCALE_IP} (shen Tailscale IP) — private, not public-facing.

services:
  postgres:
    image: postgres:17-alpine
    networks:
      - dokploy-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aggre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-aggre}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${TAILSCALE_IP}:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aggre"]
      interval: 10s
      timeout: 5s
      retries: 5

  garage:
    image: dxflrs/garage:v2.2.0
    networks:
      - dokploy-network
    volumes:
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
      - /etc/dokploy/compose/compose-connect-back-end-alarm-zgu447/garage.toml:/etc/garage.toml:ro
    ports:
      - "${TAILSCALE_IP}:3900:3900"  # S3 API
      - "${TAILSCALE_IP}:3902:3902"  # Web
      - "${TAILSCALE_IP}:3903:3903"  # Admin
    restart: unless-stopped

  hatchet-postgres:
    image: postgres:17-alpine
    networks:
      - aggre-internal
    command:
      - postgres
      - -c
      - shared_buffers=2GB
      - -c
      - work_mem=128MB
      - -c
      - maintenance_work_mem=2GB
      - -c
      - effective_cache_size=8GB
      - -c
      - wal_buffers=64MB
      - -c
      - max_wal_size=15GB
      - -c
      - autovacuum_max_workers=10
      - -c
      - autovacuum_vacuum_scale_factor=0.1
      - -c
      - autovacuum_analyze_scale_factor=0.05
      - -c
      - autovacuum_vacuum_threshold=25
      - -c
      - autovacuum_analyze_threshold=25
      - -c
      - autovacuum_vacuum_cost_delay=10ms
      - -c
      - autovacuum_vacuum_cost_limit=1000
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.1
    environment:
      POSTGRES_DB: hatchet
      POSTGRES_USER: hatchet
      POSTGRES_PASSWORD: hatchet
    volumes:
      - hatchet-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hatchet"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  hatchet-pg-maintenance:
    image: postgres:17-alpine
    networks:
      - aggre-internal
    # Periodic ANALYZE on partitioned parent tables — PostgreSQL autovacuum
    # skips these, causing stale planner stats and bad query plans.
    command: >
      sh -c 'sleep 60; while true;
      do psql "$$DATABASE_URL" -c "ANALYZE v1_tasks_olap; ANALYZE v1_runs_olap; ANALYZE v1_dags_olap;" 2>&1;
      sleep 3600; done'
    environment:
      DATABASE_URL: "postgresql://hatchet:hatchet@hatchet-postgres:5432/hatchet"
    depends_on:
      hatchet-postgres:
        condition: service_healthy
    restart: unless-stopped

  hatchet-lite:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:latest
    networks:
      - dokploy-network
      - aggre-internal
    depends_on:
      hatchet-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://hatchet:hatchet@hatchet-postgres:5432/hatchet?sslmode=disable"
      SERVER_AUTH_COOKIE_DOMAIN: hatchet.ts.shen.iorlas.net
      SERVER_AUTH_COOKIE_INSECURE: "t"
      SERVER_GRPC_BIND_ADDRESS: "0.0.0.0"
      SERVER_GRPC_INSECURE: "t"
      SERVER_GRPC_BROADCAST_ADDRESS: "hatchet-lite:7077"
      SERVER_GRPC_PORT: "7077"
      SERVER_URL: "http://hatchet.ts.shen.iorlas.net"
      SERVER_AUTH_SET_EMAIL_VERIFIED: "t"
      SEED_DEFAULT_ADMIN_EMAIL: "admin@example.com"
      SEED_DEFAULT_ADMIN_PASSWORD: ${HATCHET_ADMIN_PASSWORD}
    volumes:
      - hatchet-config:/config
    labels:
      - tailscale=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.aggre-hatchet.rule=Host(`hatchet.ts.shen.iorlas.net`)
      - traefik.http.routers.aggre-hatchet.entrypoints=web
      - traefik.http.services.aggre-hatchet.loadbalancer.server.port=8888
    restart: unless-stopped

  migrate:
    image: ghcr.io/iorlas/aggre:${IMAGE_TAG}
    networks:
      - dokploy-network
    command: uv run alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AGGRE_DATABASE_URL: "postgresql+psycopg://aggre:${POSTGRES_PASSWORD}@postgres:5432/aggre"
    env_file:
      - path: .env
        required: false

  browserless:
    image: ghcr.io/browserless/chromium
    environment:
      CONCURRENT: "3"
      TIMEOUT: "60000"
    networks:
      - dokploy-network
    restart: unless-stopped

  hatchet-worker:
    image: ghcr.io/iorlas/aggre:${IMAGE_TAG}
    networks:
      - dokploy-network
    command: uv run python -m aggre.workflows
    depends_on:
      migrate:
        condition: service_completed_successfully
      hatchet-lite:
        condition: service_started
    environment:
      AGGRE_DATABASE_URL: "postgresql+psycopg://aggre:${POSTGRES_PASSWORD}@postgres:5432/aggre"
      AGGRE_PROXY_URL: ${AGGRE_PROXY_URL}
      AGGRE_BRONZE_S3_ENDPOINT: "http://garage:3900"
      AGGRE_BRONZE_S3_BUCKET: aggre-bronze
      AGGRE_BRONZE_BACKEND: s3
      AGGRE_BROWSERLESS_URL: "http://browserless:3000"
      AGGRE_WHISPER_ENDPOINTS: "http://dtomilin-mwg.shrimp-boa.ts.net:8090:2:whisper-cpp:macbook-whisper:2,http://zep.shrimp-boa.ts.net:8100:10:openai:zep-speaches:10"
      AGGRE_MODAL_APP_NAME: aggre-transcription
      MODAL_TOKEN_ID: ${MODAL_TOKEN_ID}
      MODAL_TOKEN_SECRET: ${MODAL_TOKEN_SECRET}
      HATCHET_CLIENT_TLS_STRATEGY: none
      HATCHET_CLIENT_HOST_PORT: "hatchet-lite:7077"
      HATCHET_CLIENT_SERVER_URL: "http://hatchet-lite:8888"
      HATCHET_CLIENT_TOKEN: ${HATCHET_CLIENT_TOKEN}
    env_file:
      - path: .env
        required: false
    tmpfs:
      - /app/data/tmp:size=100G
    stop_grace_period: 300s
    restart: unless-stopped

volumes:
  postgres-data:
  garage-meta:
  garage-data:
  hatchet-postgres-data:
  hatchet-config:

networks:
  dokploy-network:
    external: true
  aggre-internal:
    internal: true
