# infrastructure/browserless-lb/docker-compose.yml
# Deployed as separate Dokploy compose app on shen.
# Worker reaches it as http://browserless-lb:8080 via dokploy-network.
services:
  browserless-lb:
    container_name: browserless-lb
    image: nginx:alpine
    networks:
      - dokploy-network
    environment:
      UPSTREAM_A: "dtomilin-mwg:3001"  # MacBook
      UPSTREAM_B: "zep:3001"           # zep
    command:
      - /bin/sh
      - -c
      - |
        printf 'upstream pool {\n  server %s max_fails=2 fail_timeout=30s;\n  server %s max_fails=2 fail_timeout=30s;\n}\nserver {\n  listen 8080;\n  location / {\n    proxy_pass http://pool;\n    proxy_http_version 1.1;\n    proxy_read_timeout 120s;\n  }\n}\n' "$UPSTREAM_A" "$UPSTREAM_B" > /etc/nginx/conf.d/default.conf
        exec nginx -g 'daemon off;'
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
