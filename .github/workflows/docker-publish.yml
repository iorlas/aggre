name: Build and Publish Docker Image

on:
    push:
        branches:
            - master
            - main
        tags:
            - "v*"
    pull_request:
        branches:
            - master
            - main
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    deploy-modal:
        if: github.event_name != 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Deploy Modal app
              env:
                  MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
                  MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
              run: uv run python -m modal deploy src/aggre/modal_apps/transcription.py

    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            id-token: write
            attestations: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Validate compose syntax
              run: |
                export IMAGE_TAG=test POSTGRES_PASSWORD=test TAILSCALE_IP=127.0.0.1
                export AGGRE_PROXY_URL=test HATCHET_CLIENT_TOKEN=test
                export MODAL_TOKEN_ID=test MODAL_TOKEN_SECRET=test
                docker compose -f docker-compose.prod.yml config --quiet

            - name: Lint compose
              run: uv run python scripts/check-compose.py

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              if: github.event_name != 'pull_request'
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=semver,pattern={{major}}
                      type=sha,prefix={{branch}}-

            - name: Build and push Docker image
              id: build
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  platforms: linux/amd64,linux/arm64

            - name: Generate artifact attestation
              if: github.event_name != 'pull_request'
              uses: actions/attest-build-provenance@v1
              with:
                  subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  subject-digest: ${{ steps.build.outputs.digest }}
                  push-to-registry: true

            - name: Deploy to Dokploy
              if: github.event_name != 'pull_request'
              env:
                  DOKPLOY_AUTH_TOKEN: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
                  DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
                  DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
                  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
                  AGGRE_PROXY_URL: ${{ secrets.AGGRE_PROXY_URL }}
                  HATCHET_CLIENT_TOKEN: ${{ secrets.HATCHET_CLIENT_TOKEN }}
                  MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
                  MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
                  TAILSCALE_IP: "100.65.108.29"
                  GIT_SHA: ${{ github.sha }}
              run: |
                  export IMAGE_TAG="main-${GIT_SHA::7}"
                  mkdir -p ~/.config/dokploy
                  echo "${DOKPLOY_AUTH_TOKEN}" > ~/.config/dokploy/token
                  echo "${DOKPLOY_URL}" > ~/.config/dokploy/url
                  pip install --quiet httpx 'websockets>=15'
                  python3 scripts/dokctl.py deploy -- "${DOKPLOY_COMPOSE_ID}" docker-compose.prod.yml
